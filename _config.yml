title: One-Day Workshop in Braided Structures, Categories, and Representation Theory
description: Torino
preposition: at

remote_theme: "DigitaleGesellschaft/jekyll-theme-conference@v4.0.1"
plugins:
  - jekyll-include-cache

collections:
  talks:
    output: true
    permalink: /:collection/:title/
  speakers:
    output: true
    permalink: /:collection/:title/
  rooms:
    output: true
    permalink: /:collection/:title/

defaults:
  - scope:
      path: ""
      type: talks
    values:
      layout: talk
  - scope:
      path: ""
      type: speakers
    values:
      layout: speaker
  - scope:
      path: ""
      type: rooms
    values:
      layout: room

conference:
  lang: en
  tz: "+01:00"
  show_errors: true
  
  navigation:
    links:
      - name: Program
        relative_url: /program/
      - name: Speakers
        relative_url: /speakers/
  
  talks:
    tracks: []
    tags: []
  
  meta:
    link_preview:
      disable: false
    schema_org:
      disable: false
      event_status: scheduled
